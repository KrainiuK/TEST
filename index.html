<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My 3D Model Viewer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 10;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px 30px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 20;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="loading">Loading 3D model...</div>
    <div id="info">
        <p>🖱️ Drag to rotate | Scroll to zoom | Right-click to pan</p>
    </div>

    <!-- Three.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- STL Loader -->
    <script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/loaders/STLLoader.js"></script>

    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));

        // Camera setup
        const camera = new THREE.PerspectiveCamera(
            75,
            window.innerWidth / window.innerHeight,
            0.1,
            10000
        );

        // Renderer setup
        const renderer = new THREE.WebGLRenderer({ 
            antialias: true, 
            canvas: document.getElementById('canvas'),
            alpha: true
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;

        // Lighting
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
        directionalLight.position.set(50, 50, 50);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        scene.add(directionalLight);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        // Load STL model
        const loader = new THREE.STLLoader();
        let model;

        loader.load('Beshimi.stl', function (geometry) {
            // Compute normals for proper lighting
            geometry.computeVertexNormals();
            geometry.center();

            // Get bounding box to scale model properly
            geometry.computeBoundingBox();
            const boundingBox = geometry.boundingBox;
            const size = boundingBox.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 50 / maxDim;

            const material = new THREE.MeshPhongMaterial({
                color: 0x00a8ff,
                emissive: 0x111111,
                shininess: 200,
                side: THREE.DoubleSide
            });

            model = new THREE.Mesh(geometry, material);
            model.scale.multiplyScalar(scale);
            model.castShadow = true;
            model.receiveShadow = true;
            scene.add(model);

            // Position camera to view the entire model
            const distance = maxDim / Math.tan((camera.fov / 2) * Math.PI / 180);
            camera.position.z = distance * 1.5;
            camera.lookAt(model.position);

            // Auto-rotate flag
            model.userData.autoRotate = true;

            // Hide loading message
            document.getElementById('loading').style.display = 'none';
        }, 
        function (progress) {
            console.log('Loading progress:', (progress.loaded / progress.total * 100) + '%');
        },
        function (error) {
            console.error('Error loading STL:', error);
            document.getElementById('loading').textContent = '❌ Error loading model. Check if Beshimi.stl exists.';
        });

        // Mouse controls
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };

        document.addEventListener('mousedown', (e) => {
            isDragging = true;
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        document.addEventListener('mousemove', (e) => {
            if (isDragging && model) {
                const deltaX = e.clientX - previousMousePosition.x;
                const deltaY = e.clientY - previousMousePosition.y;

                model.rotation.y += deltaX * 0.01;
                model.rotation.x += deltaY * 0.01;
            }
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // Mouse wheel zoom
        document.addEventListener('wheel', (e) => {
            e.preventDefault();
            camera.position.z += e.deltaY * 0.1;
            camera.position.z = Math.max(10, Math.min(500, camera.position.z));
        }, { passive: false });

        // Window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);

            if (model && model.userData.autoRotate) {
                model.rotation.z += 0.002;
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
