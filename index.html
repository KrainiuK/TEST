<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My 3D Model Viewer</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: Arial, sans-serif; }
        #canvas { width: 100%; height: 100%; display: block; }
        #info { position: absolute; top: 10px; left: 10px; background: rgba(0, 0, 0, 0.7); color: white; padding: 10px 15px; border-radius: 5px; font-size: 12px; pointer-events: none; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="info">
        <p>📱 Touch & Drag to rotate | Pinch to zoom</p>
    </div>

    <!-- Three.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- STL Loader -->
    <script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/loaders/STLLoader.js"></script>
    <!-- Orbit Controls (Fixes mobile touch interaction) -->
    <script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 100);

        const renderer = new THREE.WebGLRenderer({ antialias: true, canvas: document.getElementById('canvas') });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        // Setup OrbitControls instead of raw mouse event listeners
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // Smooths out the rotation motion
        controls.dampingFactor = 0.05;

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(50, 50, 50);
        scene.add(directionalLight);

        const loader = new THREE.STLLoader();
        let model;

        loader.load('Beshimi.stl', function (geometry) {
            geometry.computeVertexNormals();
            geometry.center();

            const material = new THREE.MeshPhongMaterial({
                color: 0x00a8ff,
                emissive: 0x111111,
                shininess: 200
            });

            model = new THREE.Mesh(geometry, material);
            scene.add(model);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Required for smooth damping
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
