<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My 3D Model Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #e9ecef; }
        canvas { display: block; }
        #loading { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            font-family: sans-serif; font-size: 20px; color: #333;
        }
    </style>
</head>
<body>
    <div id="loading">Loading 3D Model...</div>

    <!-- Import Three.js and its add-ons from a CDN -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { STLLoader } from 'three/addons/loaders/STLLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. Set up Scene, Camera, and Renderer
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 50, 100); // Adjust this if your model is very large or small

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Add Mouse Controls (OrbitControls)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // Adds a smooth, weightless feel when dragging

        // 3. Add Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 2); // Soft overall light
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
        directionalLight.position.set(1, 1, 1).normalize();
        scene.add(directionalLight);

        // 4. Load the STL Model
        const material = new THREE.MeshStandardMaterial({ 
            color: 0x007bff, // Blue color (you can change this hex code)
            roughness: 0.4, 
            metalness: 0.1 
        });

        const loader = new STLLoader();
        
        // --- IMPORTANT: CHANGE THE FILENAME BELOW ---
        loader.load('Beshimi.stl', function (geometry) {
            geometry.center(); // Automatically center the model
            
            const mesh = new THREE.Mesh(geometry, material);
            
            // Optional: You can scale the model here if it loads too big or small
            // mesh.scale.set(0.1, 0.1, 0.1); 

            scene.add(mesh);
            document.getElementById('loading').style.display = 'none'; // Hide loading text
        }, undefined, function (error) {
            console.error('Error loading STL:', error);
            document.getElementById('loading').innerText = 'Error loading model. Check console.';
        });

        // 5. Handle Window Resizing
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 6. Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Required for damping
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
