<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My 3D Models</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 2rem;
        }
        h1 { text-align: center; margin-bottom: 2rem; }
        
        /* Grid layout for the 21 models */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .model-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            text-align: center;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .model-card:hover {
            transform: translateY(-5px);
        }
        .model-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .model-card h3 { margin: 1rem 0; }
    </style>
</head>
<body>

    <h1>My 3D Portfolio</h1>
    
    <div class="gallery">
        <!-- Card 1 -->
        <a href="viewer.html?id=model1" class="model-card">
            <img src="thumbnails/model1_thumb.jpg" alt="Model 1 Thumbnail">
            <h3>Cyber Helmet</h3>
        </a>

        <!-- Card 2 -->
        <a href="viewer.html?id=model2" class="model-card">
            <img src="thumbnails/model2_thumb.jpg" alt="Model 2 Thumbnail">
            <h3>Sci-Fi Blaster</h3>
        </a>

        <!-- Add the rest of your 21 cards here following the same pattern -->
    </div>

</body>
</html>
