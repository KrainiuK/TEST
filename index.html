<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My AR Model</title>
    <!-- Loads Google's free AR viewer -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body style="margin: 0; padding: 0;">
    <!-- Displays your model and enables the "View in AR" button on phones -->
    <model-viewer 
        src="Beshimi.glb" 
        ios-src="model.usdz" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1"
        exposure="1"
        tone-mapping="aces"
        style="width: 100vw; height: 100vh;"
        auto-rotate
        auto-rotate-delay="0">
    </model-viewer>
</body>
</html>
