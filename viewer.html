<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #222; }
        #canvas-container { width: 100vw; height: 100vh; }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: white;
            color: black;
            text-decoration: none;
            font-family: sans-serif;
            border-radius: 5px;
            z-index: 100;
        }
    </style>
    
    <!-- Import Three.js via CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <a href="index.html" class="back-btn">← Back to Gallery</a>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { STLLoader } from 'three/addons/loaders/STLLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. Get the model ID from the URL (e.g., ?id=model1)
        const urlParams = new URLSearchParams(window.location.search);
        const modelId = urlParams.get('id') || 'model1'; // defaults to model1 if no ID is found

        // 2. Setup the Scene, Camera, and Renderer
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 3. Add OrbitControls so the user can rotate and zoom
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 4. Add Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 10, 10);
        scene.add(directionalLight);

        // 5. Load Texture and STL Model
        const textureLoader = new THREE.TextureLoader();
        const stlLoader = new STLLoader();

        // Load the specific PNG for this model
        textureLoader.load(`textures/${modelId}.png`, (texture) => {
            
            // Once texture is loaded, load the STL
            stlLoader.load(`models/${modelId}.stl`, (geometry) => {
                
                // Center the geometry
                geometry.center();

                // Apply the loaded texture to the material
                const material = new THREE.MeshStandardMaterial({ 
                    map: texture,
                    roughness: 0.5,
                    metalness: 0.1
                });
                
                const mesh = new THREE.Mesh(geometry, material);
                scene.add(mesh);
            });
        });

        // 6. Handle Window Resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 7. Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
